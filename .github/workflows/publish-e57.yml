name: Publish E57

on:
  push:
    branches:
      - master
    paths:
      - src/Aardvark.Data.E57/**
      - src/Aardvark.Data.Points.Base/**
      - .github/workflows/publish-e57.yml
  workflow_dispatch:

jobs:
  publish-e57:
    name: Pack and publish Aardvark.Data.E57
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore Tools
        run: dotnet tool restore

      - name: Restore Paket
        run: dotnet paket restore

      - name: Build E57
        shell: cmd
        run: dotnet build -c Release src\Aardvark.Data.E57\Aardvark.Data.E57.csproj

      - name: Read package version from csproj
        shell: pwsh
        run: |
          [xml]$project = Get-Content "src/Aardvark.Data.E57/Aardvark.Data.E57.csproj"
          $packageVersion = $project.Project.PropertyGroup.PackageVersion | Where-Object { $_ } | Select-Object -First 1
          if (-not $packageVersion) {
            throw "PackageVersion was not found in src/Aardvark.Data.E57/Aardvark.Data.E57.csproj"
          }
          "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Pack E57
        shell: cmd
        run: dotnet pack src\Aardvark.Data.E57\Aardvark.Data.E57.csproj -c Release --no-build -o bin\pack -p:Version=%PACKAGE_VERSION% -p:PackageVersion=%PACKAGE_VERSION%

      - name: Add private NuGet source
        shell: cmd
        run: dotnet nuget add source "${{ secrets.OMEGA365_NUGET_URL }}" -n Omega365 -u unused -p "${{ secrets.O365_NUGET_API_KEY }}" --store-password-in-clear-text

      - name: Push E57 package to private feed
        shell: cmd
        run: dotnet nuget push "bin\pack\Aardvark.Data.E57*.nupkg" -s Omega365 -k az
